name: Release Signed APK

# Cut a real, signed release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds a SIGNED release APK and publishes it as a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64 of your .keystore/.jks file
#   KEYSTORE_PASSWORD  store password
#   KEY_ALIAS          key alias
#   KEY_PASSWORD       key password

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  release:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing. Add the four signing secrets in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="$(printf 'Signed release **%s**\nCommit: %s\nBuilt: %s' \
            "$GITHUB_REF_NAME" "${GITHUB_SHA:0:8}" "$(date -u '+%Y-%m-%d %H:%M UTC')")"
          # Works whether the tag was pushed from git (no release yet) OR the
          # release was drafted in the GitHub web UI (release already exists):
          # create it if missing, otherwise just attach the signed APK.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/release/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" app/build/outputs/apk/release/*.apk \
              --title "Hermes2 $GITHUB_REF_NAME" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA"
          fi
